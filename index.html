<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skinner's Horse | Feedback</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="page">

    <div class="feedback-card">

        <!-- Logo -->

        <img
            src="assets/logo.png"
            class="logo"
            alt="Skinner's Horse Logo"
        >

        <!-- Title -->

        <h1>Skinner's Horse</h1>

        <h2>Since 1803</h2>

        <p class="subtitle">

            Your feedback helps us improve the Regt.

        </p>

        <!-- Form -->

        <form id="feedbackForm">

            <div class="input-group">

                <label for="userName">

                    Name (Optional)

                </label>

                <input
                    type="text"
                    id="userName"
                    maxlength="50"
                    placeholder="Enter your name"
                >

            </div>

            <div class="input-group">

                <label for="userFeedback">

                    Your Feedback <span class="required">*</span>

                </label>

                <textarea

                    id="userFeedback"

                    maxlength="1000"

                    required

                    placeholder="Please share your thoughts..."

                ></textarea>

                <div class="counter">

                    <span id="charCount">0</span>/1000

                </div>

            </div>

            <button

                id="submitBtn"

                type="submit"

            >

                Submit Feedback

            </button>

        </form>

        <!-- Success Message -->

        <div

            id="successMessage"

            class="success hidden"

        >

            ✓ Feedback submitted successfully.

            <br>

            Thank you for your valuable feedback.
        <div class="admin-link">

            <a href="admin/login.html">

            Admin Login

            </a>

        </div>
        </div>

    </div>

</div>

<!-- Firebase -->

<script type="module" src="firebase.js"></script>

<!-- App -->

<script type="module" src="app.js"></script>

</body>
</html>
