<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Feedback Dashboard</title>

    <link rel="stylesheet" href="dashboard.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="dashboard">

    <!-- ================= HEADER ================= -->

    <header class="header">

        <div></div>

        <div class="titleArea">

            <img src="../assets/logo.png" class="logo">

            <h1>Skinner's Horse</h1>

            <h2>Feedback Dashboard</h2>

        </div>

        <div class="adminButtons">

            <button id="exportBtn">

                📄 Export Feedback

            </button>

            <button id="logoutBtn">

                Sign Out

            </button>

        </div>

    </header>

    <!-- ================= STATS ================= -->

    <section class="statsGrid">

        <div class="statCard">

            <h3>Total Feedback</h3>

            <span id="totalCount">0</span>

        </div>

        <div class="statCard">

            <h3>Read</h3>

            <span id="readCount">0</span>

        </div>

        <div class="statCard">

            <h3>Unread</h3>

            <span id="unreadCount">0</span>

        </div>

        <div class="statCard">

            <h3>Anonymous</h3>

            <span id="anonymousCount">0</span>

        </div>

    </section>

    <!-- ================= SEARCH ================= -->

    <section class="toolbar">

        <input

            type="text"

            id="search"

            placeholder="Search by name or feedback...">

    </section>

    <!-- ================= FEEDBACK ================= -->

    <section id="feedbackContainer">

    </section>

</div>

<script type="module" src="dashboard.js"></script>

</body>

</html>
